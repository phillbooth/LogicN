# LogicN Spec Manifest
# Purpose: Machine-readable canonical path manifest for AI prompt bootstrapping and tooling.
# Usage:   Load this file to discover authoritative spec documents by topic.
#          Do NOT use legacy/* paths as primary sources — see notes fields.
# Updated: 2026-06-01

version: "1"
language: "LogicN"
format_version: "v1"

# ─────────────────────────────────────────────────────────────────────────────
# GRAMMAR
# ─────────────────────────────────────────────────────────────────────────────
grammar:
  canonical: docs/Knowledge-Bases/logicn-grammar.ebnf
  description: >
    Authoritative EBNF grammar for the LogicN language. Covers all v1 syntax
    including flow, fn, route, guarded flow, contract blocks, effects, type
    declarations, and expression forms.
  supplementary:
    - path: docs/Knowledge-Bases/core-syntax-keywords.md
      note: Keyword reference with examples
    - path: docs/Knowledge-Bases/unified-syntax-architecture.md
      note: How syntax constructs compose
    - path: docs/Knowledge-Bases/logicn-core-syntax-bindings-pipeline.md
      note: Binding pipeline syntax (let/mut/unsafe let/safe mut)
    - path: docs/Knowledge-Bases/logicn-syntax-if-match-optional.md
      note: if, match, optional expression forms
    - path: docs/Knowledge-Bases/logicn-syntax-loops-iteration.md
      note: Loop and iteration syntax

# ─────────────────────────────────────────────────────────────────────────────
# DIAGNOSTICS
# ─────────────────────────────────────────────────────────────────────────────
diagnostics:
  canonical: docs/Knowledge-Bases/logicn-compiler-pipeline.md
  description: >
    Pipeline doc owns the diagnostic series (LLN-SYNTAX-*, LLN-TYPE-*, etc.)
    and maps them to compiler passes. Full codes are in per-subsystem specs.
  subsystems:
    - series: "LLN-TYPE-*"
      canonical: docs/Knowledge-Bases/formal-type-system-spec.md
    - series: "LLN-VALUESTATE-*, LLN-SECRET-*, LLN-SAFETY-*"
      canonical: docs/Knowledge-Bases/value-state-annotations.md
    - series: "LLN-EFFECT-*"
      canonical: docs/Knowledge-Bases/effect-checker-and-boundary-checker.md
    - series: "LLN-NAME-*"
      canonical: docs/Knowledge-Bases/logicn-symbol-resolver-spec.md
    - series: "LLN-MATCH-*"
      canonical: docs/Knowledge-Bases/formal-type-system-spec.md
    - series: "LLN-GOV-*, LLN-INTENT-*, LLN-PII-*, LLN-PHI-*, LLN-AUDIT-*"
      canonical: docs/Knowledge-Bases/logicn-governance-verifier-spec.md
    - series: "LLN-SEC-*"
      canonical: docs/Knowledge-Bases/logicn-security-model-layers.md
    - series: "LLN-SYNTAX-*, LLN-PARSE-*"
      canonical: docs/Knowledge-Bases/logicn-compiler-pipeline.md
    - series: "LLN-BACKEND-*, LLN-TARGET-*"
      canonical: docs/Knowledge-Bases/logicn-compiler-pipeline.md
    - series: "LLN-RUNTIME-*"
      canonical: docs/Knowledge-Bases/logicn-runtime-lifecycle.md

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE
# ─────────────────────────────────────────────────────────────────────────────
pipeline:
  canonical: docs/Knowledge-Bases/logicn-compiler-pipeline.md
  description: >
    10-pass compiler pipeline. Passes 1–2: lexer and parser (always complete).
    Passes 3–7: checker passes (collect all diagnostics, do not stop at first error).
    Pass 8: GIR emitter (runs only on zero errors). Pass 9: backend lowering.
    Pass 10: runtime execution.
  pass_sources:
    pass_1_lexer: packages-logicn/logicn-core-compiler/src/lexer.ts
    pass_2_parser: packages-logicn/logicn-core-compiler/src/parser.ts
    pass_3_symbol_resolver: packages-logicn/logicn-core-compiler/src/symbol-resolver.ts
    pass_4_type_checker: packages-logicn/logicn-core-compiler/src/type-checker.ts
    pass_5_value_state_checker: packages-logicn/logicn-core-compiler/src/value-state-checker.ts
    pass_6_effect_checker: packages-logicn/logicn-core-compiler/src/effect-checker.ts
    pass_7_governance_verifier: packages-logicn/logicn-core-compiler/src/governance-verifier.ts
    pass_8_gir_emitter: packages-logicn/logicn-core-compiler/src/gir-emitter.ts
    pass_9_backend_wat_emitter: packages-logicn/logicn-core-compiler/src/wat-emitter.ts
    pass_9_backend_wat_assembler: packages-logicn/logicn-core-compiler/src/wat-assembler.ts
    pass_9_backend_lowering_plan: packages-logicn/logicn-core-compiler/src/lowering-plan.ts
    pass_10_runtime: packages-logicn/logicn-core-compiler/src/runtime/

# ─────────────────────────────────────────────────────────────────────────────
# TYPE SYSTEM
# ─────────────────────────────────────────────────────────────────────────────
type_system:
  canonical: docs/Knowledge-Bases/formal-type-system-spec.md
  description: >
    Authoritative type rules. Covers primitives, generics, branded types, match
    exhaustiveness, type inference, and all LLN-TYPE-* diagnostics.
  supplementary:
    - path: docs/Knowledge-Bases/auto-type-inference.md
      note: Auto keyword — compile-time inference
    - path: docs/Knowledge-Bases/logicn-type-system-compute-extensions.md
      note: Tensor<T,Shape>, AnyTensor, compute-specific types
    - path: docs/Knowledge-Bases/value-state-annotations.md
      note: Value-state type qualifiers (unsafe/safe)
    - path: docs/Knowledge-Bases/type-and-enum-declarations.md
      note: type and enum declaration syntax
    - path: docs/Knowledge-Bases/numeric-and-compute-types.md
      note: Numeric types (Int, Float, Money, Decimal, Byte, Char)
    - path: docs/Knowledge-Bases/polymorphism.md
      note: Parametric types, generics

# ─────────────────────────────────────────────────────────────────────────────
# EFFECTS
# ─────────────────────────────────────────────────────────────────────────────
effects:
  canonical: docs/Knowledge-Bases/effect-checker-and-boundary-checker.md
  description: >
    Effect system — what effects exist, how they are declared (in flow only),
    how they propagate upward through the call graph, and boundary rules.
  critical_rule: >
    fn CANNOT declare effects. Only flow, pure flow, guarded flow, and secure
    flow may declare effects. fn declaring effects emits LLN-SEC-014.
    See flow-vs-fn-security-model.md for the canonical security contract.
  supplementary:
    - path: docs/Knowledge-Bases/flow-vs-fn-security-model.md
      note: Canonical fn vs flow security contract — PRIMARY for fn/flow effect rules
    - path: docs/Knowledge-Bases/logicn-effect-checker-architecture.md
      note: Effect checker internals
    - path: docs/Knowledge-Bases/logicn-effect-inference-tracking.md
      note: How effects are inferred and tracked through calls
    - path: docs/Knowledge-Bases/logicn-core-intent-safety-effects.md
      note: Intent, safety, and effects interplay
  legacy:
    - path: docs/Knowledge-Bases/logicn-core-effect-checker-v02.md
      status: SUPERSEDED
      note: >
        v0.2 historical. The CheckedFunction class predate the fn-cannot-declare-effects
        rule. Do not use for effect declaration rules.

