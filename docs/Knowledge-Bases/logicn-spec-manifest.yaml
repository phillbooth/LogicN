      note: Boot, execution, shutdown
    - path: docs/Knowledge-Bases/governed-execution-director.md
      note: How the GED coordinates execution
    - path: docs/Knowledge-Bases/logicn-package-manifest-spec.md
      note: Package manifest spec — runtime deployment artifact
    - path: docs/Knowledge-Bases/runtime-profiles.md
      note: Runtime profiles and modes
    - path: docs/Knowledge-Bases/runtime-policy-config.md
      note: Runtime policy configuration
    - path: docs/Knowledge-Bases/runtime-identity-model.md
      note: Runtime identity model
    - path: docs/Knowledge-Bases/runtime-audit-log-format.md
      note: Audit log format emitted at runtime
